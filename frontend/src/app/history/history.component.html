<div class="history-container">
  <mat-card>
    <mat-card-title>📜 Historique des mouvements
        <button mat-icon-button color="primary" (click)="exportInventaires()" matTooltip="Exporter Inventaires en CSV">
      <mat-icon>download</mat-icon>
    </button>
    </mat-card-title>
    <mat-card-content>
      <!-- Filtre et tri rapide -->
      <div class="toolbar">
        <mat-form-field appearance="outline" class="filter-field">
          <mat-label>Filtrer (référence, type, commentaire)</mat-label>
          <input matInput [(ngModel)]="filterText" (keyup)="applyFilter()">
        </mat-form-field>
        <div class="sort-buttons">
          <button mat-stroked-button (click)="onSort('Date')">
            Date <mat-icon>{{ sortBy === 'Date' ? (descending ? 'arrow_downward' : 'arrow_upward') : 'unfold_more' }}</mat-icon>
          </button>
          <button mat-stroked-button (click)="onSort('ReferenceArticle')">
            Référence <mat-icon>{{ sortBy === 'ReferenceArticle' ? (descending ? 'arrow_downward' : 'arrow_upward') : 'unfold_more' }}</mat-icon>
          </button>
          <button mat-stroked-button (click)="onSort('Type')">
            Type <mat-icon>{{ sortBy === 'Type' ? (descending ? 'arrow_downward' : 'arrow_upward') : 'unfold_more' }}</mat-icon>
          </button>
          <button mat-stroked-button (click)="onSort('Quantite')">
            Quantité <mat-icon>{{ sortBy === 'Quantite' ? (descending ? 'arrow_downward' : 'arrow_upward') : 'unfold_more' }}</mat-icon>
          </button>
        </div>
      </div>

      <div class="table-wrapper">
        <table mat-table [dataSource]="allMouvements" class="mat-elevation-z8">
          <ng-container matColumnDef="date">
            <th mat-header-cell *matHeaderCellDef> Date </th>
            <td mat-cell *matCellDef="let m"> {{ m.date | date:'dd/MM/yyyy HH:mm' }} </td>
          </ng-container>
          <ng-container matColumnDef="referenceArticle">
            <th mat-header-cell *matHeaderCellDef> Article </th>
            <td mat-cell *matCellDef="let m"> {{ m.referenceArticle }} </td>
          </ng-container>
          <ng-container matColumnDef="type">
            <th mat-header-cell *matHeaderCellDef> Type </th>
            <td mat-cell *matCellDef="let m"> {{ m.type }} </td>
          </ng-container>
          <ng-container matColumnDef="quantite">
            <th mat-header-cell *matHeaderCellDef> Quantité </th>
            <td mat-cell *matCellDef="let m"> {{ m.quantite }} </td>
          </ng-container>
          <ng-container matColumnDef="commentaire">
            <th mat-header-cell *matHeaderCellDef> Commentaire </th>
            <td mat-cell *matCellDef="let m"> {{ m.commentaire }} </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
      </div>

      <div class="pagination">
        <button mat-stroked-button (click)="previousPage()" [disabled]="currentPage === 1">
          <mat-icon>chevron_left</mat-icon> Précédent
        </button>
        <span>Page {{currentPage}} / {{totalPages}}</span>
        <button mat-stroked-button (click)="nextPage()" [disabled]="currentPage === totalPages">
          Suivant <mat-icon>chevron_right</mat-icon>
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</div>
